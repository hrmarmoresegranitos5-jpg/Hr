<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ceará">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

<title>Ceará Planejados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #0E0E1A; }
body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ── CSS Variables ── */
:root {
  --bg:    #0E0E1A; --bg2: #131320; --s1: #16162A; --s2: #1A1A2E; --s3: #1E1E34; --s4: #22223A;
  --gold:  #C9A84C; --gold2: #EDD060; --gold3: rgba(212,175,55,0.12); --gold4: rgba(212,175,55,0.06);
  --grn:   #3A9E6A; --grn2: rgba(58,158,106,0.12);
  --tx:    #EDEAE0; --t2: #B8B4A8; --t3: #7A7880; --t4: #4E4C58;
  --red:   #E05555; --red2: rgba(224,85,85,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4); --shadow-md: 0 4px 20px rgba(0,0,0,0.55); --shadow-lg: 0 8px 40px rgba(0,0,0,0.7);
  --border: 1px solid rgba(255,255,255,0.06); --border-g: 1px solid rgba(212,175,55,0.2);
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px;
}

/* ── Keyframes ── */
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(18px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes scaleIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes pageEnter { 0%{opacity:0;transform:translateY(10px) scale(.99)} 60%{opacity:1;transform:translateY(-2px) scale(1.001)} 100%{opacity:1;transform:translateY(0) scale(1)} }
@keyframes navIconPop { 0%{transform:scale(1) translateY(0)} 40%{transform:scale(1.25) translateY(-3px)} 70%{transform:scale(.95) translateY(1px)} 100%{transform:scale(1.12) translateY(0)} }
@keyframes springIn { 0%{transform:scale(.88);opacity:0} 55%{transform:scale(1.04);opacity:1} 80%{transform:scale(.98)} 100%{transform:scale(1);opacity:1} }
@keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }
@keyframes slideDown { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes modalUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes toastIn { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }

/* ── App Layout ── */
#sApp { display:flex; flex-direction:column; height:100%; background:var(--bg); position:relative; }
#hdrAndPages { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }

/* ── Header ── */
#hdr {
  display:flex; align-items:center; gap:12px; padding:12px 20px;
  background:rgba(14,14,26,0.85); backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border-bottom:1px solid transparent; background-clip:padding-box;
  position:relative; z-index:50; flex-shrink:0;
}
#hdr::after { content:''; position:absolute; bottom:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent 0%,rgba(212,175,55,0.3) 30%,rgba(212,175,55,0.5) 50%,rgba(212,175,55,0.3) 70%,transparent 100%); }
.hlogo { width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,#1A1A2C,#0E0E1A);border:1px solid rgba(212,175,55,0.4);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 0 18px rgba(212,175,55,0.18),0 0 0 1px rgba(212,175,55,0.06),var(--shadow-sm);flex-shrink:0;cursor:pointer;transition:transform 160ms cubic-bezier(.34,1.56,.64,1); }
.hlogo:active { transform:scale(.9); }
.hnm { flex:1;font-size:.95rem;font-weight:700;color:var(--tx);letter-spacing:.01em;display:flex;flex-direction:column; }
.hsub { font-size:.62rem;font-weight:500;color:var(--t4);letter-spacing:.04em;margin-top:1px; }
.hdt { font-size:.72rem;font-weight:500;color:var(--t3);letter-spacing:.02em;flex-shrink:0; }

/* ── Pages ── */
#pages { flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;scrollbar-width:none; }
#pages::-webkit-scrollbar { display:none; }
.pg { padding:20px 18px 0; animation:pageEnter 240ms cubic-bezier(.25,.46,.45,.94) both; will-change:opacity,transform; }

/* ── NavBar ── */
#nav {
  display:flex;align-items:stretch;
  background:rgba(14,14,26,0.92);backdrop-filter:blur(24px) saturate(1.6);
  -webkit-backdrop-filter:blur(24px) saturate(1.6);
  padding-bottom:env(safe-area-inset-bottom,0px);position:relative;z-index:100;flex-shrink:0;
}
#nav::before { content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(212,175,55,0.2) 20%,rgba(212,175,55,0.4) 50%,rgba(212,175,55,0.2) 80%,transparent 100%); }
.ni { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:transparent;cursor:pointer;position:relative;min-height:60px;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation; }
.ni-ic-wrap { position:relative;display:flex;align-items:center;justify-content:center;width:44px;height:32px;border-radius:16px;transition:background 200ms ease;margin-bottom:4px; }
.ni.on .ni-ic-wrap { background:rgba(212,175,55,0.14); }
.ni-i { font-size:1.25rem;display:block;transition:transform 200ms cubic-bezier(.34,1.56,.64,1);line-height:1; }
.ni.on .ni-i { transform:scale(1.18) translateY(-1px);animation:navIconPop 300ms cubic-bezier(.34,1.56,.64,1) both; }
.ni-l { font-size:.6rem;font-weight:500;color:var(--t4);letter-spacing:.02em;transition:color 160ms ease;line-height:1;white-space:nowrap; }
.ni.on .ni-l { color:var(--gold);font-weight:700; }
.ni.on::after { content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(212,175,55,0.6);animation:fadeIn 200ms ease both; }
.ni-cta .ni-ic-wrap { width:52px;height:36px;border-radius:18px;background:linear-gradient(145deg,#C9A84C,#A88030);box-shadow:0 2px 12px rgba(180,140,40,0.35); }
.ni-cta.on .ni-ic-wrap { background:linear-gradient(145deg,#EDD060,#C9A84C);box-shadow:0 4px 18px rgba(212,175,55,0.45); }
.ni-cta:active .ni-ic-wrap { transform:scale(.92); }
.ni-cta .ni-i { font-size:1.15rem; }
.ni-cta.on .ni-l { color:var(--gold2); }

/* ── Cards ── */
.card {
  background:var(--s2);border:var(--border);border-radius:var(--r-lg);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow-sm);
  transition:transform 120ms ease,box-shadow 120ms ease;
  position:relative;overflow:hidden;
}
.card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  pointer-events:none;
}
.card:active { transform:scale(.99); }
.section { margin-bottom:20px; }
.section-ttl {
  font-size:.65rem;font-weight:700;color:var(--t4);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:12px;padding-left:2px;
  display:flex;align-items:center;gap:8px;
}
.section-ttl::before {
  content:'';display:inline-block;
  width:14px;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);
  border-radius:2px;flex-shrink:0;
}
.hero { margin-bottom:22px; }
.hero-ttl { font-size:1.5rem;font-weight:800;color:var(--tx);letter-spacing:-.01em; }
.hero-sub { font-size:.78rem;color:var(--t3);margin-top:4px;font-weight:400; }

/* ── Buttons ── */
.btn { display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r-sm);padding:11px 18px;font-size:.82rem;font-weight:700;font-family:var(--font);cursor:pointer;transition:transform 120ms cubic-bezier(.34,1.56,.64,1),opacity 120ms ease,box-shadow 120ms ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation;outline:none;font-family:'Outfit',sans-serif; }
.btn:active { transform:scale(.95);opacity:.9; }
.btn-gold  { background:linear-gradient(145deg,#C9A84C,#A88030);color:#0E0E1A;box-shadow:0 2px 10px rgba(180,140,40,.3); }
.btn-grn   { background:linear-gradient(145deg,#3A9E6A,#2E7D52);color:#fff;box-shadow:0 2px 10px rgba(58,158,106,.25); }
.btn-ghost { background:rgba(255,255,255,.06);color:var(--t2);border:var(--border); }
.btn-red   { background:linear-gradient(145deg,#E05555,#B83B3B);color:#fff; }
.btn-full  { width:100%; }
.btn-sm    { padding:8px 13px;font-size:.76rem;border-radius:8px; }

/* ── Quick Action Grid ── */
.qa-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.qa-btn {
  display:flex;flex-direction:column;align-items:flex-start;gap:0;
  padding:18px 14px 15px;
  background:linear-gradient(155deg,#1A1A2C 0%,#131322 100%);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--r-lg);
  cursor:pointer;
  transition:transform 140ms cubic-bezier(.34,1.56,.64,1),background 120ms ease,border-color 130ms ease,box-shadow 120ms ease;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  animation:slideUp 160ms ease both;
  position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,255,255,0.05);
}
/* Linha topo colorida por tipo */
.qa-btn::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:var(--qa-color, rgba(212,175,55,0.4));
  opacity:0.7;
}
.qa-btn::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(155deg,rgba(255,255,255,0.04) 0%,transparent 50%);
  pointer-events:none;
}
.qa-btn:active {
  transform:scale(.95);
  background:linear-gradient(155deg,#1E1E34,#161628);
  border-color:rgba(212,175,55,0.3);
  box-shadow:0 2px 8px rgba(0,0,0,0.6),0 0 0 1px rgba(212,175,55,0.12);
}
.qa-ic {
  font-size:1.6rem;width:48px;height:48px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-bottom:12px;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
  position:relative;z-index:1;
}
.qa-nm { font-size:.84rem;font-weight:700;color:var(--tx);line-height:1.2;letter-spacing:-.01em;position:relative;z-index:1; }
.qa-sm { font-size:.63rem;font-weight:400;color:var(--t4);margin-top:3px;letter-spacing:.01em;position:relative;z-index:1; }
.qa-arr { position:absolute;bottom:12px;right:13px;font-size:.75rem;color:rgba(212,175,55,0.35);font-weight:800;z-index:1; }


/* ── Info items ── */
.info-item { display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.04); }
.info-item:last-child { border-bottom:none; }
.info-ic { font-size:1.25rem;width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.info-lbl { font-size:.66rem;font-weight:700;color:var(--t4);margin-bottom:2px;letter-spacing:.04em;text-transform:uppercase; }
.info-val { font-size:.8rem;font-weight:500;color:var(--t2);line-height:1.35; }
.info-body {}

/* ── Stat cards ── */
.stat-card {
  flex:1;
  background:linear-gradient(160deg,rgba(30,28,50,0.9),rgba(18,16,36,0.95));
  border:1px solid rgba(212,175,55,0.18);
  border-radius:var(--r-md);
  padding:14px 8px 12px;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.4),inset 0 1px 0 rgba(212,175,55,0.08);
}
.stat-card::before {
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.5),transparent);
}
.stat-card::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:40%;
  background:radial-gradient(ellipse at 50% 100%,rgba(212,175,55,0.06),transparent);
  pointer-events:none;
}
.stat-val {
  font-size:1.45rem;font-weight:800;
  background:linear-gradient(135deg,#EDD060,#C9A84C);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;margin-bottom:5px;letter-spacing:-.03em;
  position:relative;z-index:1;
}
.stat-lbl { font-size:.56rem;font-weight:700;color:var(--t4);letter-spacing:.1em;text-transform:uppercase;position:relative;z-index:1; }

/* ── Home Banner ── */
.home-banner {
  border-radius:var(--r-xl);
  padding:22px 20px 0;
  margin-bottom:20px;
  background:
    radial-gradient(ellipse 100% 80% at 85% 0%, rgba(212,175,55,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 5% 100%, rgba(100,80,200,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(212,175,55,0.04) 0%, transparent 70%),
    linear-gradient(155deg,#1C1C30 0%,#111120 60%,#0E0E1C 100%);
  border:1px solid rgba(212,175,55,0.22);
  box-shadow:
    0 8px 40px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(212,175,55,0.15),
    inset 0 -1px 0 rgba(0,0,0,0.3),
    0 0 0 1px rgba(255,255,255,0.03);
  overflow:hidden;position:relative;
}
.home-banner::before {
  content:'';position:absolute;top:-80px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.13) 0%,transparent 65%);
  pointer-events:none;
}
.home-banner::after {
  content:'';position:absolute;bottom:-40px;left:-40px;
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(100,80,220,0.09) 0%,transparent 70%);
  pointer-events:none;
}
/* Linha decorativa dourada no topo do banner */
.home-banner-glow {
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(212,175,55,0.6) 30%,rgba(237,208,96,0.9) 50%,rgba(212,175,55,0.6) 70%,transparent 100%);
}
.home-banner-top { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;position:relative;z-index:1; }
.home-banner-nm {
  font-size:1.35rem;font-weight:800;letter-spacing:-.025em;margin-bottom:4px;
  background:linear-gradient(135deg,#EDEAE0 0%,#C8C4B8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.home-banner-sub { font-size:.7rem;color:var(--t3);font-weight:400;letter-spacing:.04em; }
.home-stats { display:flex;gap:8px;padding:16px 0 20px;border-top:1px solid rgba(255,255,255,0.05);position:relative;z-index:1; }



/* ── Badges ── */
.badge { display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.64rem;font-weight:700;background:rgba(255,255,255,.06);color:var(--t2);letter-spacing:.02em; }
.badge-grn  { background:var(--grn2);color:var(--grn); }
.badge-gold { background:var(--gold3);color:var(--gold); }
.badge-red  { background:var(--red2);color:var(--red); }

/* ── Tables ── */
.tbl { width:100%;border-collapse:collapse; }
.tbl th,.tbl td { padding:9px 4px;text-align:left;font-size:.76rem; }
.tbl th { color:var(--t4);font-weight:600;font-size:.68rem;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05); }
.tbl td { color:var(--t2);border-bottom:1px solid rgba(255,255,255,.03); }
.tbl tr:last-child td { border-bottom:none; }
.tbl td:last-child,.tbl th:last-child { text-align:right;color:var(--gold);font-weight:700; }

/* ── Fields ── */
.divider { height:1px;background:rgba(255,255,255,.05);margin:12px 0; }
.field { margin-bottom:14px; }
.field label { display:block;font-size:.7rem;font-weight:600;color:var(--t3);margin-bottom:6px;letter-spacing:.03em; }
input[type=text],input[type=number],input[type=email],input[type=tel],input[type=date],select,textarea {
  width:100%;background:var(--s3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--r-sm);padding:12px 14px;font-family:'Outfit',sans-serif;font-size:.86rem;color:var(--tx);outline:none;appearance:none;-webkit-appearance:none;transition:border-color 150ms ease,box-shadow 150ms ease;
}
input:focus,select:focus,textarea:focus { border-color:rgba(212,175,55,0.4);box-shadow:0 0 0 3px rgba(212,175,55,0.08); }
::placeholder { color:var(--t4); }
input[type=date] { color-scheme:dark; }

/* ── Orçamento page ── */
.orc-tipos { display:flex;overflow-x:auto;gap:8px;padding-bottom:8px;margin-bottom:18px;scrollbar-width:none; }
.orc-tipos::-webkit-scrollbar { display:none; }
.orc-tipo-btn { flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 14px;background:var(--s2);border:var(--border);border-radius:var(--r-md);cursor:pointer;transition:background 130ms ease,border-color 130ms ease,transform 130ms ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation;outline:none; }
.orc-tipo-btn.active { background:var(--gold3);border-color:rgba(212,175,55,0.4); }
.orc-tipo-btn:active { transform:scale(.95); }
.orc-tipo-ic { font-size:1.4rem;line-height:1; }
.orc-tipo-lbl { font-size:.6rem;font-weight:600;color:var(--t3);letter-spacing:.02em;white-space:nowrap; }
.orc-tipo-btn.active .orc-tipo-lbl { color:var(--gold); }
.orc-result { background:linear-gradient(135deg,rgba(212,175,55,0.07),rgba(212,175,55,0.03));border:1px solid rgba(212,175,55,0.2);border-radius:var(--r-lg);padding:18px 16px;margin-bottom:14px;animation:scaleIn .18s ease both; }
.orc-total { font-size:2rem;font-weight:800;color:var(--gold2);letter-spacing:-.02em;line-height:1;margin-bottom:4px; }
.orc-avista { font-size:.72rem;color:var(--grn);font-weight:600;margin-bottom:14px; }
.orc-linhas { border-top:1px solid rgba(255,255,255,.05);padding-top:12px; }
.orc-linha { display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.73rem;color:var(--t3);border-bottom:1px solid rgba(255,255,255,.03); }
.orc-linha:last-child { border-bottom:none; }
.orc-linha span:last-child { color:var(--t2);font-weight:600; }
.orc-cad { width:100%;border-radius:8px;background:#ffffff !important;border:none;margin-bottom:14px;display:block; }
.orc-accs { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px; }
.orc-acc-btn { display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:var(--border);border-radius:20px;cursor:pointer;font-size:.7rem;font-weight:600;color:var(--t3);transition:background 120ms ease,border-color 120ms ease;-webkit-tap-highlight-color:transparent;outline:none; }
.orc-acc-btn.on { background:var(--gold3);border-color:rgba(212,175,55,0.35);color:var(--gold); }
.orc-acc-btn.obrig { opacity:.5;cursor:default; }
.orc-saved { display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r-md);background:rgba(58,158,106,0.1);border:1px solid rgba(58,158,106,0.25);font-size:.72rem;font-weight:600;color:var(--grn);animation:slideUp .22s ease both;margin-bottom:10px; }
.campo-row { display:flex;gap:10px; }
.campo-row .field { flex:1; }

/* ── Historico ── */
.hist-wrap { display:flex;flex-direction:column;height:100%;overflow:hidden; }
.hist-head { flex-shrink:0;padding:16px 16px 0; }
.hist-titulo { font-size:1rem;font-weight:700;color:var(--tx);margin-bottom:12px; }
.hist-filtros { display:flex;gap:8px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px; }
.hist-filtros::-webkit-scrollbar { display:none; }
.hist-chip { flex-shrink:0;display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:50px;border:1px solid rgba(255,255,255,.08);background:var(--s2);font-size:.68rem;font-weight:600;color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap;outline:none; }
.hist-chip.on { background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3);color:var(--gold); }
.hist-busca { position:relative;margin-bottom:10px; }
.hist-busca-ic { position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none; }
.hist-busca input { width:100%;box-sizing:border-box;padding:10px 12px 10px 34px;background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:10px;font-size:.78rem;color:var(--tx);outline:none;font-family:'Outfit',sans-serif; }
.hist-busca input:focus { border-color:rgba(201,168,76,.3);background:var(--s3); }
.hist-date-row { display:flex;gap:8px;margin-bottom:10px; }
.hist-date-group { flex:1;display:flex;flex-direction:column; }
.hist-date-lbl { font-size:.62rem;color:var(--t4);margin-bottom:3px; }
.hist-date-row input[type=date] { flex:1;padding:9px 10px;background:var(--s2);border:1px solid rgba(255,255,255,.07);border-radius:10px;font-size:.72rem;color:var(--tx);outline:none;font-family:'Outfit',sans-serif;color-scheme:dark; }
.hist-resumo { font-size:.64rem;color:var(--t4);padding:0 2px 8px; }
.hist-list { flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none; }
.hist-list::-webkit-scrollbar { display:none; }
.hist-empty { display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;font-size:.76rem;color:var(--t4);text-align:center;line-height:1.8;gap:8px; }
.hist-empty-ic { font-size:2rem; }
.orc-card { background:var(--s2);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-bottom:10px;overflow:hidden;animation:fadeIn .2s ease both; }
.orc-card-top { display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer; }
.orc-card-ic { width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0; }
.orc-card-info { flex:1;min-width:0; }
.orc-card-titulo { font-size:.82rem;font-weight:700;color:var(--tx);margin-bottom:2px; }
.orc-card-sub { font-size:.65rem;color:var(--t3); }
.orc-card-total { text-align:right;flex-shrink:0; }
.orc-card-valor { font-size:.88rem;font-weight:800;color:var(--gold2); }
.orc-card-data { font-size:.58rem;color:var(--t4);margin-top:2px; }
.orc-card-expand { padding:0 14px 12px;border-top:1px solid rgba(255,255,255,.04); }
.orc-card-detail { padding:8px 0 4px; }
.orc-detail-row { display:flex;justify-content:space-between;padding:3px 0;font-size:.69rem;color:var(--t3); }
.orc-detail-row span:last-child { color:var(--t2); }
.orc-card-actions { display:flex;gap:8px;padding-top:8px; }
.orc-act-btn { flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 6px;border-radius:9px;border:none;font-size:.64rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:transform 120ms ease,opacity 120ms ease;-webkit-tap-highlight-color:transparent; }
.orc-act-btn:active { transform:scale(.94);opacity:.85; }
.orc-act-editar { background:rgba(201,168,76,.1);color:var(--gold); }
.orc-act-dupl { background:rgba(80,160,220,.1);color:#50A0DC; }
.orc-act-excluir { background:var(--red2);color:var(--red); }
.hist-toast { position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--s4);color:var(--tx);padding:10px 20px;border-radius:50px;font-size:.75rem;font-weight:700;border:var(--border);box-shadow:var(--shadow-md);animation:toastIn .25s ease both;z-index:500;white-space:nowrap; }

/* ── Preços ── */
.price-section { margin-bottom:24px; }
.price-section-header { margin-bottom:12px; }
.price-section-header h3 { font-size:.9rem;font-weight:700;color:var(--tx);margin-bottom:3px; }
.price-section-header p  { font-size:.72rem;color:var(--t3); }

/* ── Config ── */
.garantia-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px; }
.garantia-card { background:var(--s2);border:var(--border);border-radius:var(--r-md);padding:16px;text-align:center; }
.garantia-ic  { font-size:1.6rem;margin-bottom:8px; }
.garantia-ttl { font-size:.8rem;font-weight:700;color:var(--tx);margin-bottom:4px; }
.garantia-sub { font-size:.68rem;color:var(--t3);line-height:1.5; }
.sobre-hero { text-align:center;padding:20px 0 24px; }
.sobre-nm { font-size:1.4rem;font-weight:800;color:var(--tx);margin-bottom:4px; }
.sobre-sub { font-size:.76rem;color:var(--t3); }

/* ── Modal ── */
.modal-backdrop { position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);padding:0 0 env(safe-area-inset-bottom); }
.modal-box { width:100%;max-width:420px;background:var(--s2);border-radius:20px 20px 0 0;border:1px solid rgba(255,255,255,.06);padding:20px 20px 32px;box-shadow:0 -8px 40px rgba(0,0,0,.5);animation:modalUp .22s ease; }
.modal-titulo { font-size:.82rem;font-weight:700;color:var(--tx);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06); }
.modal-msg { font-size:.78rem;color:var(--t3);margin-bottom:20px;line-height:1.6; }
.modal-row { display:flex;gap:10px; }
.modal-wpp-preview { background:rgba(0,0,0,.25);border-radius:10px;padding:12px;font-size:.68rem;color:var(--t2);line-height:1.7;white-space:pre-wrap;max-height:220px;overflow-y:auto;margin-bottom:16px;font-family:monospace; }

/* ── Clientes ── */
.cliente-card { background:var(--s2);border:var(--border);border-radius:var(--r-md);padding:14px 16px;margin-bottom:10px; }
.cliente-top { display:flex;align-items:center;justify-content:space-between; }
.cliente-avatar { width:40px;height:40px;border-radius:12px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0; }
.cliente-ult { margin-top:10px;padding:8px 10px;background:rgba(0,0,0,.2);border-radius:8px;display:flex;justify-content:space-between;align-items:center; }

/* ── Skeleton ── */
.skeleton { position:relative;overflow:hidden;background:rgba(255,255,255,.04);border-radius:8px; }
.skeleton::after { content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.07) 50%,transparent 100%);animation:shimmer 1.5s infinite;will-change:transform; }

/* ── Misc ── */
.page-loader { display:flex;align-items:center;justify-content:center;height:38vh;opacity:.35;font-size:.78rem;color:var(--t4);animation:fadeIn 300ms ease both; }

/* ── PWA Install Banner ── */
#pwaInstallBanner {
  display:none;
  align-items:center; gap:10px;
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(237,208,96,0.06));
  border-bottom:1px solid rgba(212,175,55,0.2);
  animation:slideDown 300ms cubic-bezier(.34,1.56,.64,1) both;
  flex-shrink:0; z-index:40; position:relative;
}
#pwaInstallBanner.show { display:flex; }
#pwaInstallBanner .pib-ic { font-size:1.4rem; flex-shrink:0; }
#pwaInstallBanner .pib-txt { flex:1; }
#pwaInstallBanner .pib-ttl { font-size:.75rem;font-weight:700;color:var(--tx);line-height:1.3; }
#pwaInstallBanner .pib-sub { font-size:.63rem;color:var(--t3);margin-top:1px; }
#pwaInstallBanner .pib-btn {
  background:linear-gradient(145deg,#C9A84C,#A88030);
  color:#0E0E1A; border:none; border-radius:20px;
  padding:7px 14px; font-size:.72rem; font-weight:800;
  font-family:'Outfit',sans-serif; cursor:pointer;
  white-space:nowrap; flex-shrink:0;
  box-shadow:0 2px 10px rgba(180,140,40,.35);
  transition:transform 120ms cubic-bezier(.34,1.56,.64,1),box-shadow 120ms ease;
  -webkit-tap-highlight-color:transparent;
}
#pwaInstallBanner .pib-btn:active { transform:scale(.93); box-shadow:none; }
#pwaInstallBanner .pib-close {
  background:none; border:none; color:var(--t4); cursor:pointer;
  font-size:1rem; padding:4px; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
@keyframes splashShimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

/* ── Home Hero Card (novo design) ── */
.home-hero-card {
  position: relative;
  border-radius: 22px;
  margin-bottom: 22px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 110% 70% at 90% -10%, rgba(212,175,55,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 0% 110%, rgba(80,100,220,0.12) 0%, transparent 55%),
    linear-gradient(160deg, #1C1C32 0%, #111124 55%, #0E0E1C 100%);
  border: 1px solid rgba(212,175,55,0.25);
  box-shadow:
    0 10px 50px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(212,175,55,0.18),
    0 0 0 1px rgba(255,255,255,0.025);
  padding: 20px 20px 0;
}
.hhc-glow-top {
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(212,175,55,0.5) 25%,
    rgba(237,208,96,1) 50%,
    rgba(212,175,55,0.5) 75%,
    transparent 100%
  );
}
.hhc-glow-corner {
  position: absolute; top: -60px; right: -50px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 65%);
  pointer-events: none;
}
.hhc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
  position: relative; z-index: 1;
}
.hhc-logo {
  width: 44px; height: 44px;
  border-radius: 13px;
  background: linear-gradient(145deg, #22223A, #14141F);
  border: 1px solid rgba(212,175,55,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  box-shadow: 0 0 18px rgba(212,175,55,0.18), 0 4px 12px rgba(0,0,0,0.5);
  flex-shrink: 0;
}
.hhc-title-block { flex: 1; min-width: 0; }
.hhc-nome {
  font-size: 1.05rem; font-weight: 800; letter-spacing: -.02em;
  background: linear-gradient(135deg, #EDEAE0 0%, #C8C4B8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2; margin-bottom: 3px;
}
.hhc-cats {
  font-size: .62rem; font-weight: 400;
  color: var(--t4); letter-spacing: .04em;
}
.hhc-status {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  font-size: .58rem; font-weight: 800;
  letter-spacing: .06em;
  white-space: nowrap;
  flex-shrink: 0;
}
.hhc-status.aberto {
  background: rgba(58,158,106,0.15);
  border: 1px solid rgba(58,158,106,0.35);
  color: #4DBF88;
  box-shadow: 0 2px 10px rgba(58,158,106,0.12);
}
.hhc-status.fechado {
  background: rgba(200,80,80,0.13);
  border: 1px solid rgba(200,80,80,0.28);
  color: #E07070;
  box-shadow: 0 2px 10px rgba(200,80,80,0.1);
}
.hhc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}
.hhc-status.aberto .hhc-dot {
  background: #4DBF88;
  box-shadow: 0 0 8px rgba(58,158,106,0.9);
}
.hhc-status.fechado .hhc-dot {
  background: #E07070;
  box-shadow: 0 0 8px rgba(200,80,80,0.7);
}
.hhc-dot.pulsing { animation: pulse 2s infinite; }

.hhc-divider {
  height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.06) 20%,
    rgba(212,175,55,0.12) 50%,
    rgba(255,255,255,0.06) 80%,
    transparent
  );
  margin: 0 -20px;
  position: relative; z-index: 1;
}
.hhc-pills {
  display: flex;
  align-items: stretch;
  padding: 16px 0 20px;
  position: relative; z-index: 1;
}
.hhc-pill {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
}
.hhc-pill-sep {
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(212,175,55,0.2), transparent);
  margin: 4px 0;
}
.hhc-pill-val {
  font-size: 1.5rem; font-weight: 800;
  letter-spacing: -.04em; line-height: 1;
  background: linear-gradient(135deg, #EDD060, #C9A84C);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hhc-pill-lbl {
  font-size: .57rem; font-weight: 600;
  color: var(--t4); letter-spacing: .06em;
  text-transform: uppercase;
}

/* ── Home Minimalista ── */
.home-minimal { padding-top: 4px; }

.hm-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; padding: 0 2px;
}
.hm-greet {
  font-size: 1.15rem; font-weight: 800; color: var(--tx);
  letter-spacing: -.02em;
}
.hm-status {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  font-size: .62rem; font-weight: 700; letter-spacing: .04em;
}
.hm-status.aberto {
  background: rgba(58,158,106,0.13); border: 1px solid rgba(58,158,106,0.3);
  color: #4DBF88;
}
.hm-status.fechado {
  background: rgba(200,80,80,0.11); border: 1px solid rgba(200,80,80,0.25);
  color: #E07070;
}
.hm-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.hm-status.aberto .hm-dot { background: #4DBF88; box-shadow: 0 0 7px rgba(58,158,106,0.9); }
.hm-status.fechado .hm-dot { background: #E07070; }
.hm-dot.pulsing { animation: pulse 2s infinite; }

.hm-section { margin-bottom: 24px; }
.hm-section-lbl {
  font-size: .6rem; font-weight: 700; color: var(--t4);
  letter-spacing: .12em; text-transform: uppercase;
  margin-bottom: 10px; padding-left: 2px;
  display: flex; align-items: center; gap: 7px;
}
.hm-section-lbl::before {
  content: ''; width: 12px; height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
  border-radius: 2px; display: inline-block;
}

/* Grid orçamento rápido — 3 colunas compactas */
.hm-orc-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.hm-orc-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 12px 6px 10px;
  background: var(--s2);
  border: 1px solid var(--hob-color, rgba(255,255,255,0.07));
  border-radius: 14px;
  cursor: pointer; outline: none;
  transition: transform 130ms cubic-bezier(.34,1.56,.64,1), background 120ms ease;
  -webkit-tap-highlight-color: transparent;
  animation: slideUp 160ms ease both;
  position: relative; overflow: hidden;
}
.hm-orc-btn::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--hob-color, rgba(255,255,255,0.07));
}
.hm-orc-btn:active { transform: scale(.93); }
.hm-orc-ic { font-size: 1.5rem; line-height: 1; }
.hm-orc-nm {
  font-size: .6rem; font-weight: 700; color: var(--t2);
  text-align: center; line-height: 1.3;
  font-family: 'Outfit', sans-serif;
}

/* Lista menu principal */
.hm-menu-list {
  display: flex; flex-direction: column; gap: 8px;
}
.hm-menu-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--s2); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  cursor: pointer; outline: none;
  transition: transform 130ms cubic-bezier(.34,1.56,.64,1), background 110ms ease, border-color 110ms ease;
  -webkit-tap-highlight-color: transparent;
  animation: slideUp 160ms ease both;
  width: 100%; text-align: left;
}
.hm-menu-row:active {
  transform: scale(.97);
  background: var(--s3);
  border-color: rgba(212,175,55,0.15);
}
.hm-menu-ic {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.hm-menu-txt { flex: 1; min-width: 0; }
.hm-menu-nm {
  font-size: .88rem; font-weight: 700; color: var(--tx);
  letter-spacing: -.01em; line-height: 1.2;
  font-family: 'Outfit', sans-serif;
}
.hm-menu-sub {
  font-size: .65rem; font-weight: 400; color: var(--t4);
  margin-top: 2px; font-family: 'Outfit', sans-serif;
}
.hm-menu-arr {
  font-size: .9rem; color: rgba(212,175,55,0.35);
  font-weight: 800; flex-shrink: 0;
}

/* ── Melhorias visuais globais premium ── */

/* Fundo do app com textura sutil */
#sApp {
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(201,168,76,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 80% 40% at 100% 100%, rgba(80,100,200,0.04) 0%, transparent 50%),
    var(--bg) !important;
}

/* Header com glow dourado mais forte */
#hdr {
  background: rgba(10,10,20,0.92) !important;
  box-shadow: 0 1px 0 rgba(212,175,55,0.15), 0 4px 20px rgba(0,0,0,0.5);
}

/* Logo no header — glow animado */
#hdrLogo {
  animation: hdrLogoPulse 4s ease-in-out infinite alternate;
}
@keyframes hdrLogoPulse {
  from { box-shadow: 0 0 12px rgba(212,175,55,0.12), 0 0 0 1px rgba(212,175,55,0.06); }
  to   { box-shadow: 0 0 24px rgba(212,175,55,0.28), 0 0 0 1px rgba(212,175,55,0.12); }
}

/* Cards com efeito shimmer no hover */
.card {
  transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease !important;
}
.card:active {
  border-color: rgba(212,175,55,0.15) !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.08) !important;
}

/* QA buttons — glow colorido ao toque */
.qa-btn:active {
  box-shadow: 0 0 0 1px var(--qa-color), 0 4px 20px rgba(0,0,0,0.7) !important;
}

/* Nav bar — fundo mais profundo */
#nav {
  background: rgba(8,8,16,0.96) !important;
  box-shadow: 0 -1px 0 rgba(212,175,55,0.1), 0 -4px 20px rgba(0,0,0,0.4);
}

/* Botões gold com shimmer */
.btn-gold {
  position: relative; overflow: hidden;
}
.btn-gold::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  animation: btnShimmer 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes btnShimmer {
  0%   { left: -100%; }
  40%  { left: 100%; }
  100% { left: 100%; }
}

/* Section titles com linha mais viva */
.section-ttl::before {
  background: linear-gradient(90deg, var(--gold2), var(--gold), transparent) !important;
  height: 2px !important;
  width: 18px !important;
}

/* Home menu rows — linha dourada sutil no topo ao toque */
.hm-menu-row:active::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
  border-radius: 14px 14px 0 0;
}
.hm-menu-row { position: relative; }

/* Stat cards — animação de brilho */
.stat-card::before {
  animation: statGlow 3s ease-in-out infinite alternate;
}
@keyframes statGlow {
  from { opacity: 0.5; }
  to   { opacity: 1; }
}

/* Page enter mais suave */
@keyframes pageEnter {
  0%   { opacity:0; transform:translateY(12px) scale(.99); }
  55%  { opacity:1; transform:translateY(-1px) scale(1.001); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

/* Scroll indicator no topo das páginas */
#pages { 
  scroll-behavior: smooth;
}

/* ORC result card mais impactante */
.orc-result {
  background: linear-gradient(135deg, rgba(212,175,55,0.09), rgba(212,175,55,0.04)) !important;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.12) !important;
}

/* ── Porta de Correr — seletor de folhas ── */
.correr-folhas {
  display:flex; gap:8px;
}
.folha-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:2px; padding:10px 6px 9px;

}

.folha-n {
  font-size:1.45rem; font-weight:800; line-height:1;

}
.folha-btn.active .folha-n { color:rgba(100,200,255,0.9); }
.folha-lbl {
  font-size:.6rem; font-weight:600; color:var(--t4);

}

  font-size:.58rem; color:var(--t4); text-align:center;

  border:1px solid rgba(80,160,220,0.18);

}
.ci-item {

  gap:2px; padding:4px 0;
}
.ci-sep {
  width:1px; height:32px;
  background:linear-gradient(180deg,transparent,rgba(100,200,255,0.2),transparent);
  flex-shrink:0;
}
.ci-ic { font-size:.85rem; line-height:1; }
.ci-v  { font-size:1rem; font-weight:800; color:rgba(100,200,255,0.85); line-height:1; }
.ci-l  { font-size:.55rem; font-weight:600; color:var(--t4); letter-spacing:.04em; text-transform:uppercase; }

/* ── Modal Compartilhar ── */
.comp-opt {
  display: flex; align-items: center; gap: 14px;

  background: var(--s2); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; cursor: pointer; outline: none;
  margin-bottom: 10px; text-align: left;
  transition: transform 130ms cubic-bezier(.34,1.56,.64,1), background 110ms ease, border-color 110ms ease;
  -webkit-tap-highlight-color: transparent;
  font-family: 'Outfit', sans-serif;
}
.comp-opt:active {
  transform: scale(.97);
  background: var(--s3);
  border-color: rgba(212,175,55,0.2);
}
.comp-opt-ic {
  width: 46px; height: 46px; border-radius: 13px;

  font-size: 1.4rem; flex-shrink: 0;
}
.comp-opt-body { flex: 1; min-width: 0; }
.comp-opt-nm {
  font-size: .88rem; font-weight: 700; color: var(--tx);

}
.comp-opt-sub {
  font-size: .65rem; color: var(--t4); line-height: 1.4;
}
.comp-opt-arr {
  font-size: 1.1rem; color: rgba(212,175,55,0.4);
  font-weight: 800; flex-shrink: 0;
}



/* ── Configurações ─────────────────────────────────────────── */
#pgConfig { padding: 0 14px 0; }

.cfg-hero {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 0 14px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  margin-bottom: 14px;
}
.cfg-hero-logo {
  width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(201,168,76,.25), rgba(201,168,76,.1));
  border: 1px solid rgba(201,168,76,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 800; color: #C9A84C; letter-spacing: .05em;
}
.cfg-hero-nm  { font-size: .95rem; font-weight: 800; color: var(--tx, #f0f0f0); }
.cfg-hero-sub { font-size: .65rem; color: var(--t4, #888); margin-top: 2px; }

.cfg-aviso {

  font-size: .68rem; color: rgba(201,168,76,.9); line-height: 1.4;
}

.cfg-bloco {
  background: var(--card-bg, #12121e);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px; margin-bottom: 11px; overflow: hidden;
}

  display: flex; align-items: center; gap: 7px;
  font-size: .62rem; font-weight: 700; color: var(--gold2, #C9A84C);
  text-transform: uppercase; letter-spacing: .09em;
  padding: 9px 14px 8px;
  background: rgba(201,168,76,.06);
  border-bottom: 1px solid rgba(255,255,255,.05);
}

/* Grade 2 colunas para campos numéricos */
.cfgc-grade {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: rgba(255,255,255,.04);
  border-top: 1px solid rgba(255,255,255,.04);
}
.cfgc-grade .cfgc {
  background: var(--card-bg, #12121e);
  padding: 11px 12px;
}

/* Campo texto: ocupa linha inteira */
.cfgc.cfgc-full {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.cfgc.cfgc-full:last-child { border-bottom: none; }

.cfgc-lbl {
  font-size: .6rem; font-weight: 600;
  color: var(--t4, #777); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 6px;
}

.cfgc-inp-row {
  display: flex; align-items: center; gap: 5px;
}
.cfgc-pfx {
  font-size: .65rem; color: var(--t3, #999); flex-shrink: 0;
}
.cfgc-sfx {
  font-size: .6rem; color: var(--t4, #777); flex-shrink: 0;
}
.cfgc-inp {
  flex: 1; min-width: 0;
  background: rgba(255,255,255,.07);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: 7px 8px;
  font-size: .85rem; font-weight: 700;
  color: var(--tx, #f0f0f0); font-family: inherit;
  text-align: right; outline: none;
  transition: border-color .15s, background .15s;
  -moz-appearance: textfield;
}
.cfgc-inp::-webkit-inner-spin-button,
.cfgc-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
.cfgc-inp:focus {
  border-color: rgba(201,168,76,.6);
  background: rgba(201,168,76,.06);
}
.cfgc-inp-txt {
  text-align: left; font-weight: 500;
  font-size: .78rem; width: 100%;
}

/* Botões do rodapé */
.cfg-footer-btns { padding: 8px 0 6px; display: flex; flex-direction: column; gap: 8px; }

.cfg-btn-salvar {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #2e8b57, #1e6e42);
  border: none; border-radius: 12px;
  font-size: .85rem; font-weight: 700; color: #fff;
  font-family: inherit; cursor: pointer; letter-spacing: .02em;
  transition: opacity .15s, transform .1s;
}
.cfg-btn-salvar:active { transform: scale(.98); opacity: .85; }
.cfg-btn-dirty {
  background: linear-gradient(135deg, #c9a84c, #a8893a) !important;
  animation: pulse-cfg .8s ease-in-out infinite alternate;
}
@keyframes pulse-cfg { from { box-shadow: 0 0 0 0 rgba(201,168,76,0); } to { box-shadow: 0 0 0 6px rgba(201,168,76,.25); } }

.cfg-btn-reset {
  width: 100%; padding: 11px;
  background: transparent;
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px; font-size: .75rem;
  color: var(--t3, #999); font-family: inherit; cursor: pointer;
}
.cfg-btn-reset:active { opacity: .7; }

}

}
